# ****************************************************************************************************
# 本機執行mysql , VSCODE執行spring boot用
spring.datasource.url=jdbc:mysql://127.0.0.1:3307/auth_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
# ****************************************************************************************************



spring.datasource.username=auth_user
spring.datasource.password=auth_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. JPA / Hibernate 設定
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# update: 自動根據 Entity 建立或更新資料表 (開發時好用)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

