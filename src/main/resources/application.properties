spring.application.name=demo

# ****************************************************************************************************
# 遠端主機機執行react , spring boot用
# 用docker跑時會優先讀去docker-compose.yml裡面的環境變數,所以這邊3307會被3306複寫是正確的
# spring.datasource.url=jdbc:mysql://localhost:3307/auth_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
# ****************************************************************************************************


# ****************************************************************************************************
# 預設連到本機 Docker 跑的 MySQL
# spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/auth_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
# ****************************************************************************************************



# ****************************************************************************************************
# 本機執行mysql , 本機執行spring boot用
spring.datasource.url=jdbc:mysql://127.0.0.1:3307/auth_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
# ****************************************************************************************************



spring.datasource.username=auth_user
spring.datasource.password=auth_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

#  LINE Login 設定 (本機測試用)
LINE_CHANNEL_ID=自己建
LINE_CHANNEL_SECRET=自己建
LINE_CALLBACK_URL=http://localhost:5173/callback


google.client-id: 自己建
google.client-secret: 自己建
google.token-uri: https://oauth2.googleapis.com/token
google.user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo


# Facebook Login 設定
facebook.app-id=自己建
facebook.app-secret=自己建
# 雖然前端會傳 redirectUri  但這個是用來讓後端參考或驗證的預設值
facebook.redirect-uri=http://localhost:5173/callback
facebook.token-uri=https://graph.facebook.com/v19.0/oauth/access_token
facebook.user-info-uri=https://graph.facebook.com/me



