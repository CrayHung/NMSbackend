# 自訂的 IoT 過渡期設定 (之後上正確硬體 並糗 移除middleware後要設為false)
iot:
  workaround:
    # 啟用發送指令前清空 Queue 的機制 (未來硬體到位後改為 false 即可無痛廢除)
    enable-flush-queue: true

